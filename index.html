<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade 1</title>
</head>

<style>
  table, td, th {
  border: 2px solid gainsboro;
  border-collapse: collapse;
}
  #a {
    background-color: rgb(22, 121, 22);
    color: white;
  }

  #b {
    background-color: rgb(5, 88, 5);
    text-align: center;
    color: white;
  }
  #rodape {
    text-align: center;
    background-color: rgb(190, 186, 186);

  }
  #menuzinho{
    margin: 20px;
    background-color: rgb(190, 186, 186);
  }
  #menuzinho th {
    background-color: rgb(141, 138, 138);
  }
</style>

<body>
  <table>
   <tr>
    <th id="a" colspan="2">Meu Site</th>
   </tr>

   <tr>
    <td id="b" colspan="2">Usando tabelas em HTML</th>
   </tr>

   <tr>
    <td rowspan="2">
      <table id="menuzinho">
        <tr>
          <th>Menu</th>
        </tr>
        <tr>
          <td>
            <ul>
              <li> <a href="">Inicio</a></li>
              <li> <a href="">Sobre</a></li>
              <li> <a href="">Serviços</a></li>
              <li> <a href="">Contatos</a></li>
            </ul>
          </td>
        </tr>
      </table>
    </td>    
  </tr>

  <tr>
    <td>
      <b>Bem-vindo!</b> 
      <hr>
      <p>Este é um exemplo desite criado utilizando tabelas.</p>
      <p>Antigamente, esse era um método comum para estruturar páginas.</p>
    </td>
  </tr>

   <tr id="rodape">
    <td colspan="2">© 2026 - Feito por Bia</td>
   </tr>
  </table>

</body>

</html>
